<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>SkyNode Monitor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Monitoramento de recursos</h1>
    <main id="dashboard">
        <div id="c-cpu" class="card">
            <h2>USO DE CPU</h2>
            <span class="v">0</span>%
        </div>
        <div id="c-ram" class="card">
            <h2>MEMÓRIA RAM</h2>
            <span class="v">0</span>GB
        </div>
        <div id="c-temp" class="card">
            <h2>TEMPERATURA</h2>
            <span class="v">0</span>°C
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
